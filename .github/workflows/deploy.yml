name: Deploy Backend to AWS ECS Fargate

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      push_image_only:
        description: Build and push the image without updating ECS (first-time setup)
        required: false
        type: boolean
        default: false

env:
  ECS_TASK_DEFINITION: aws/ecs-task-definition.json
  ECS_CONTAINER_NAME: drai-api

jobs:
  deploy:
    name: Build image and deploy service
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" ./backend
          docker push "$IMAGE_URI"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Configure ECS task definition
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.push_image_only }}
        env:
          AWS_REGION_VALUE: ${{ secrets.AWS_REGION }}
          ECS_EXECUTION_ROLE_ARN: ${{ secrets.ECS_EXECUTION_ROLE_ARN }}
          ECS_TASK_ROLE_ARN: ${{ secrets.ECS_TASK_ROLE_ARN }}
          DATABASE_URL_SECRET_ARN: ${{ secrets.DATABASE_URL_SECRET_ARN }}
          HF_TOKEN_SECRET_ARN: ${{ secrets.HF_TOKEN_SECRET_ARN }}
          JWT_SECRET_KEY_SECRET_ARN: ${{ secrets.JWT_SECRET_KEY_SECRET_ARN }}
          CORS_ORIGINS_VALUE: ${{ vars.CORS_ORIGINS }}
        run: |
          jq \
            --arg executionRoleArn "$ECS_EXECUTION_ROLE_ARN" \
            --arg taskRoleArn "$ECS_TASK_ROLE_ARN" \
            --arg databaseSecret "$DATABASE_URL_SECRET_ARN" \
            --arg hfSecret "$HF_TOKEN_SECRET_ARN" \
            --arg jwtSecret "$JWT_SECRET_KEY_SECRET_ARN" \
            --arg region "$AWS_REGION_VALUE" \
            --arg cors "$CORS_ORIGINS_VALUE" \
            '.executionRoleArn = $executionRoleArn
              | .taskRoleArn = $taskRoleArn
              | .containerDefinitions[0].secrets[0].valueFrom = $databaseSecret
              | .containerDefinitions[0].secrets[1].valueFrom = $hfSecret
              | .containerDefinitions[0].secrets[2].valueFrom = $jwtSecret
              | .containerDefinitions[0].logConfiguration.options["awslogs-region"] = $region
              | .containerDefinitions[0].environment[2].value = $cors' \
            "$ECS_TASK_DEFINITION" > task-definition.resolved.json

      - name: Set deployed image in task definition
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.push_image_only }}
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.resolved.json
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.push_image_only }}
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
